name: Auto-Fix Engine

on:
  issues:
    types: [opened, labeled]

# Only run when the issue has the "auto-fix" label.
# You can add this label automatically on issue creation via another workflow,
# or manually triage which issues should trigger the loop.
jobs:
  auto-fix:
    if: contains(github.event.issue.labels.*.name, 'auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install jsdom

      # ── 3. Baseline — verify tests pass before we touch anything ───────────
      - name: Run baseline tests
        id: baseline
        run: node scripts/run-tests.js --format=json > /tmp/baseline.json
        continue-on-error: true

      # ── 4. Auto-fix loop (up to 3 attempts) ───────────────────────────────
      - name: Auto-fix loop
        id: fix_loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -e

          MAX_ATTEMPTS=3
          ATTEMPT=0
          SUCCESS=false

          # Collect source files to send as context
          SOURCE_CONTEXT=$(cat \
            "semai Extension/Resources/contentScript.js" \
            "semai Extension/Resources/background.js" \
            "semai Extension/Resources/content.js" \
            docs/patches/patches.json \
            tests/test-cases.json \
          )

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$SUCCESS" = "false" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "::group::Attempt $ATTEMPT / $MAX_ATTEMPTS"

            # ── Build Claude prompt ────────────────────────────────────────
            FAILING_TESTS=$(cat /tmp/baseline.json 2>/dev/null || echo '{}')
            PREV_ATTEMPT_NOTES=""
            if [ -f /tmp/prev_attempt.txt ]; then
              PREV_ATTEMPT_NOTES="Previous attempt notes: $(cat /tmp/prev_attempt.txt)"
            fi

            PROMPT="You are a self-healing Safari Web Extension auto-fix engine.

## Bug report
Title: ${ISSUE_TITLE}
Body:
${ISSUE_BODY}

## Failing tests (JSON)
${FAILING_TESTS}

## Source context
\`\`\`
${SOURCE_CONTEXT}
\`\`\`

${PREV_ATTEMPT_NOTES}

## Task
1. Analyse the bug report and failing tests.
2. Propose a minimal fix. The fix may be:
   - A change to an existing source file (output the full updated file contents), OR
   - A new entry for docs/patches/patches.json (hotpatch), OR
   - Both.
3. Also propose a new test case entry for tests/test-cases.json that would catch this bug.

Respond with ONLY valid JSON in this exact shape (no markdown fences, no commentary outside JSON):
{
  \"explanation\": \"<one paragraph>\",
  \"files\": [
    { \"path\": \"<repo-relative path>\", \"content\": \"<full file content as a string>\" }
  ],
  \"newTestCase\": { <valid test-cases.json case object> },
  \"patchEntry\": null
}"

            # ── Call Claude API ────────────────────────────────────────────
            RESPONSE=$(node -e "
              const https = require('https');
              const body = JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 4096,
                messages: [{ role: 'user', content: process.env.PROMPT }]
              });
              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                  'content-length': Buffer.byteLength(body)
                }
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  const parsed = JSON.parse(data);
                  process.stdout.write(parsed.content[0].text);
                });
              });
              req.on('error', e => { console.error(e); process.exit(1); });
              req.write(body);
              req.end();
            " PROMPT="$PROMPT")

            echo "$RESPONSE" > /tmp/claude_response.json

            # ── Apply proposed file changes ────────────────────────────────
            node -e "
              const fs = require('fs');
              const resp = JSON.parse(fs.readFileSync('/tmp/claude_response.json', 'utf8'));
              if (!resp.files) { console.error('No files in response'); process.exit(1); }
              for (const f of resp.files) {
                const dir = require('path').dirname(f.path);
                fs.mkdirSync(dir, { recursive: true });
                fs.writeFileSync(f.path, f.content, 'utf8');
                console.log('Wrote', f.path);
              }
              // Append new test case if provided
              if (resp.newTestCase) {
                const tcPath = 'tests/test-cases.json';
                const tc = JSON.parse(fs.readFileSync(tcPath, 'utf8'));
                const exists = tc.cases.some(c => c.id === resp.newTestCase.id);
                if (!exists) {
                  tc.cases.push(resp.newTestCase);
                  fs.writeFileSync(tcPath, JSON.stringify(tc, null, 2) + '\n');
                  console.log('Added test case', resp.newTestCase.id);
                }
              }
              // Append patch entry if provided
              if (resp.patchEntry) {
                const pp = 'docs/patches/patches.json';
                const pm = JSON.parse(fs.readFileSync(pp, 'utf8'));
                const exists = pm.patches.some(p => p.id === resp.patchEntry.id);
                if (!exists) {
                  pm.patches.push(resp.patchEntry);
                  fs.writeFileSync(pp, JSON.stringify(pm, null, 2) + '\n');
                  console.log('Added patch entry', resp.patchEntry.id);
                }
              }
            "

            # ── Validate ───────────────────────────────────────────────────
            if node scripts/run-tests.js --format=json > /tmp/test_result.json 2>&1; then
              echo "Tests passed on attempt $ATTEMPT."
              SUCCESS=true
            else
              echo "Tests still failing after attempt $ATTEMPT."
              cat /tmp/test_result.json > /tmp/prev_attempt.txt
              # Revert changes so next attempt starts clean
              git checkout -- .
            fi

            echo "::endgroup::"
          done

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT

      # ── 5a. Open PR when fix passes ────────────────────────────────────────
      - name: Open PR with fix
        if: steps.fix_loop.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="auto-fix/issue-${ISSUE_NUMBER}-$(date +%s)"
          git config user.name  "semai-bot"
          git config user.email "semai-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}

          Generated by the semai self-healing engine (claude-sonnet-4-6).
          Closes #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: auto-fix for issue #${ISSUE_NUMBER}" \
            --body "Automated fix generated by the semai self-healing engine.

          - Model: claude-sonnet-4-6
          - Attempts: ${{ steps.fix_loop.outputs.attempts }}
          - All tests pass ✓

          Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base main

      # ── 5b. Comment on issue when all attempts fail ────────────────────────
      - name: Comment on issue (all attempts failed)
        if: steps.fix_loop.outputs.success != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LAST_RESULT=$(cat /tmp/claude_response.json 2>/dev/null | \
            node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
              try { console.log(JSON.parse(d).explanation); } catch { console.log(d.slice(0,500)); }")
          gh issue comment "$ISSUE_NUMBER" --body "**Auto-fix engine exhausted all ${{ steps.fix_loop.outputs.attempts }} attempts.**

          Last explanation from Claude:
          > ${LAST_RESULT}

          A human reviewer will need to address this issue manually. The attempted fixes have been discarded."
