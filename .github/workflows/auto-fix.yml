name: Auto-Fix Engine

on:
  issues:
    types: [opened, labeled]

# Only runs when the issue carries the "auto-fix" label.
jobs:
  auto-fix:
    if: contains(github.event.issue.labels.*.name, 'auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ── Try extracting a pre-approved patch from the issue body ──────────
      # Exit code 0 = approved patch found and applied to patches.json.
      # Exit code 2 = no approved patch markers — fall back to Claude loop.
      # Exit code 1 = malformed patch data — fail the step.
      - name: Extract approved patch
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/extract-approved-patch.js
        continue-on-error: true

      # ── Run tests after applying the approved patch ─────────────────────
      - name: Run tests (approved patch)
        id: approved_tests
        if: steps.extract.outcome == 'success'
        run: node scripts/run-tests.js --format=json > /tmp/test_result.json 2>&1
        continue-on-error: true

      - name: Set approved patch result
        id: approved_result
        if: steps.extract.outcome == 'success'
        run: |
          if [ "${{ steps.approved_tests.outcome }}" = "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "method=approved-patch" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "Tests failed with approved patch — reverting."
            git checkout -- .
            git clean -fd
          fi

      # ── Fallback: Claude-based auto-fix loop ───────────────────────────
      - name: Run baseline tests
        id: baseline
        if: steps.extract.outcome != 'success' || steps.approved_result.outputs.success != 'true'
        run: node scripts/run-tests.js --format=json > /tmp/baseline.json
        continue-on-error: true

      - name: Auto-fix loop (Claude fallback)
        id: fix_loop
        if: steps.extract.outcome != 'success' || steps.approved_result.outputs.success != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          FAILING_TESTS_FILE: /tmp/baseline.json
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$SUCCESS" = "false" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "::group::Attempt $ATTEMPT / $MAX_ATTEMPTS"

            PREV_FILE=""
            if [ -f /tmp/prev_explanation.txt ]; then
              PREV_FILE="/tmp/prev_explanation.txt"
            fi

            ATTEMPT=$ATTEMPT node scripts/call-claude.js /tmp/claude_response.json $PREV_FILE

            node scripts/apply-fix.js /tmp/claude_response.json

            if node scripts/run-tests.js --format=json > /tmp/test_result.json 2>&1; then
              echo "Tests passed on attempt $ATTEMPT."
              SUCCESS=true
            else
              echo "Tests still failing after attempt $ATTEMPT."
              node scripts/get-explanation.js /tmp/claude_response.json /tmp/prev_explanation.txt
              git checkout -- .
              git clean -fd
            fi

            echo "::endgroup::"
          done

          echo "success=$SUCCESS" >> "$GITHUB_OUTPUT"
          echo "attempts=$ATTEMPT" >> "$GITHUB_OUTPUT"

      # ── Determine overall result ────────────────────────────────────────
      - name: Resolve outcome
        id: outcome
        run: |
          if [ "${{ steps.approved_result.outputs.success }}" = "true" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "method=approved-patch" >> "$GITHUB_OUTPUT"
            echo "attempts=1" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.fix_loop.outputs.success }}" = "true" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "method=claude-fallback" >> "$GITHUB_OUTPUT"
            echo "attempts=${{ steps.fix_loop.outputs.attempts }}" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "attempts=${{ steps.fix_loop.outputs.attempts }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Open PR with fix ────────────────────────────────────────────────
      - name: Open PR with fix
        if: steps.outcome.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          METHOD="${{ steps.outcome.outputs.method }}"
          ATTEMPTS="${{ steps.outcome.outputs.attempts }}"
          BRANCH="auto-fix/issue-${ISSUE_NUMBER}-$(date +%s)"
          git config user.name  "semai-bot"
          git config user.email "semai-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: auto-fix for issue #${ISSUE_NUMBER}

          Generated by the semai self-healing engine (${METHOD}).
          Closes #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: auto-fix for issue #${ISSUE_NUMBER}" \
            --body "Automated fix generated by the semai self-healing engine.

          - Method: ${METHOD}
          - Attempts: ${ATTEMPTS}
          - All tests pass

          Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base main

      # ── Comment on issue if all methods failed ──────────────────────────
      - name: Comment on issue (all attempts failed)
        if: steps.outcome.outputs.success != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          EXPLANATION=""
          if [ -f /tmp/claude_response.json ]; then
            EXPLANATION=$(node scripts/get-explanation.js /tmp/claude_response.json)
          fi
          gh issue comment "$ISSUE_NUMBER" --body "Auto-fix engine exhausted all attempts.

          ${EXPLANATION:+Last explanation from Claude:
          > $EXPLANATION
          }
          A human reviewer will need to address this manually."
