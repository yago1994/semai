// Shims — must be defined before semaiSigDetector.js loads
let _debugLogs = [];

function semaiNativeLog(text) {
  console.log("[playground]", text);
  _debugLogs.push(text);
}
function semaiLog(msg, details) {
  if (details !== undefined) console.log(msg, details);
  else console.log(msg);
}

<script>

// ─────────────────────────────────────────────────────────────────────────────
// Sender name parsing (mirrors what the test suite does)
// ─────────────────────────────────────────────────────────────────────────────

function parseSenderInput(raw) {
  const s = (raw || "").trim().toLowerCase();
  if (!s) return null;
  // If contains comma, treat as "Last, First [Middle]" → return array of tokens
  // filtering single-char tokens
  if (s.includes(",")) {
    const tokens = s.split(/[\s,]+/).filter(t => t.length >= 2);
    return tokens.length > 0 ? tokens : null;
  }
  // Single token (e.g. "daniel") — return as string
  const tokens = s.split(/\s+/).filter(t => t.length >= 2);
  if (tokens.length === 1) return tokens[0];
  return tokens.length > 0 ? tokens : null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Diff highlighting helpers
// ─────────────────────────────────────────────────────────────────────────────

function collectLeafTextNodes(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const texts = new Set();
  const walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT);
  let node;
  while ((node = walker.nextNode())) {
    const t = (node.textContent || "").trim();
    if (t) texts.add(t);
  }
  return texts;
}

// Build an iframe srcdoc with text that was removed wrapped in <mark> for the
// left pane, and text that was kept (present in cleaned) wrapped in <mark> for
// the right pane.
function buildHighlightedHtml(html, removedTexts, markStyle) {
  if (!html) return "<em style='color:#9ca3af;font-size:13px;font-style:italic;padding:16px;display:block'>(empty — entire email was a signature)</em>";

  // We apply highlighting by walking text nodes in a temp div
  const tmp = document.createElement("div");
  tmp.innerHTML = html;

  if (removedTexts && removedTexts.size > 0) {
    const walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT);
    const toMark = [];
    let node;
    while ((node = walker.nextNode())) {
      const t = (node.textContent || "").trim();
      if (t && removedTexts.has(t)) {
        toMark.push(node);
      }
    }
    for (const textNode of toMark) {
      const mark = document.createElement("mark");
      mark.style.cssText = markStyle;
      const parent = textNode.parentNode;
      parent.insertBefore(mark, textNode);
      mark.appendChild(textNode);
    }
  }

  return tmp.innerHTML;
}

function buildIframeSrcdoc(bodyHtml) {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; padding: 12px 16px; margin: 0; line-height: 1.5; }
  mark { border-radius: 2px; padding: 0 1px; }
</style>
</head><body>${bodyHtml}</body></html>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Clear manual test panel
// ─────────────────────────────────────────────────────────────────────────────

function clearManualTest() {
  document.getElementById("htmlInput").value = "";
  document.getElementById("senderInput").value = "";
  document.getElementById("leftPaneWrap").innerHTML = '<div class="pane-empty">Paste HTML and click "Run Detection"</div>';
  document.getElementById("rightPaneWrap").innerHTML = '<div class="pane-empty">Cleaned output will appear here</div>';
  const statusBar = document.getElementById("statusBar");
  statusBar.textContent = "";
  statusBar.className = "status-bar";
  const debugPanel = document.getElementById("debugPanel");
  debugPanel.innerHTML = "";
  debugPanel.classList.remove("visible");
  _debugLogs = [];
}

// ─────────────────────────────────────────────────────────────────────────────
// Run detection from the manual input panel
// ─────────────────────────────────────────────────────────────────────────────

function runDetection() {
  const html = document.getElementById("htmlInput").value.trim();
  const senderRaw = document.getElementById("senderInput").value.trim();
  const statusBar = document.getElementById("statusBar");
  const debugPanel = document.getElementById("debugPanel");

  if (!html) {
    statusBar.textContent = "Paste some HTML first.";
    statusBar.className = "status-bar error";
    return;
  }

  // Reset debug log capture
  _debugLogs = [];

  try {
    const senderTokens = parseSenderInput(senderRaw);
    const bodyEl = document.createElement("div");
    bodyEl.dataset.semaiOriginalHtml = html;
    const cleanedHtml = semaiCleanBodyClone(bodyEl, senderTokens);

    renderPanes(html, cleanedHtml);

    const senderDesc = senderTokens
      ? (Array.isArray(senderTokens) ? JSON.stringify(senderTokens) : `"${senderTokens}"`)
      : "(no sender)";
    statusBar.textContent = `Detection complete. Sender: ${senderDesc}. Cleaned HTML length: ${cleanedHtml.length} chars.`;
    statusBar.className = "status-bar success";
  } catch (err) {
    statusBar.textContent = `Error: ${err.message}`;
    statusBar.className = "status-bar error";
    console.error(err);
  }

  // Render debug log
  if (_debugLogs.length > 0) {
    debugPanel.innerHTML = _debugLogs.map(line => {
      let cls = "log-skip";
      if (/Strategy \d.*(MATCH|collapsing|removing|hiding)/i.test(line)) cls = "log-hit";
      else if (/Strategy \d/i.test(line)) cls = "log-strategy";
      else if (/skipped/i.test(line)) cls = "log-skip";
      else if (/false positive|warning/i.test(line)) cls = "log-warning";
      return `<div class="${cls}">${line.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
    }).join("");
    debugPanel.classList.add("visible");
    debugPanel.scrollTop = debugPanel.scrollHeight;
  } else {
    debugPanel.classList.remove("visible");
  }
}

function renderPanes(originalHtml, cleanedHtml) {
  const origTexts = collectLeafTextNodes(originalHtml);
  const cleanTexts = collectLeafTextNodes(cleanedHtml);

  // Removed = in original but not in cleaned
  const removedTexts = new Set([...origTexts].filter(t => !cleanTexts.has(t)));
  // Kept = in cleaned
  const keptTexts = cleanTexts;

  const leftHtml = buildHighlightedHtml(
    originalHtml,
    removedTexts,
    "background:#fecaca;text-decoration:line-through"
  );
  const rightHtml = buildHighlightedHtml(
    cleanedHtml,
    keptTexts,
    "background:#bbf7d0"
  );

  const leftWrap = document.getElementById("leftPaneWrap");
  const rightWrap = document.getElementById("rightPaneWrap");

  leftWrap.innerHTML = "";
  rightWrap.innerHTML = "";

  const leftFrame = document.createElement("iframe");
  leftFrame.className = "preview";
  leftFrame.setAttribute("sandbox", "allow-same-origin");
  leftFrame.srcdoc = buildIframeSrcdoc(leftHtml);
  leftWrap.appendChild(leftFrame);

  const rightFrame = document.createElement("iframe");
  rightFrame.className = "preview";
  rightFrame.setAttribute("sandbox", "allow-same-origin");
  rightFrame.srcdoc = buildIframeSrcdoc(rightHtml);
  rightWrap.appendChild(rightFrame);
}

// ─────────────────────────────────────────────────────────────────────────────
// Run a single test case — returns { passed, failDetails }
// ─────────────────────────────────────────────────────────────────────────────

function runTestCase(tc) {
  const bodyEl = document.createElement("div");
  bodyEl.dataset.semaiOriginalHtml = tc.html;
  const cleanHtml = semaiCleanBodyClone(bodyEl, tc.sender);

  const tmp = document.createElement("div");
  tmp.innerHTML = cleanHtml;
  const cleanText = (tmp.textContent || "").replace(/\s+/g, " ").trim();

  const failDetails = [];

  for (const phrase of (tc.mustKeep || [])) {
    if (!cleanText.includes(phrase)) {
      failDetails.push(`should keep: "${phrase}"`);
    }
  }
  for (const phrase of (tc.mustRemove || [])) {
    if (cleanText.includes(phrase)) {
      failDetails.push(`should remove: "${phrase}"`);
    }
  }

  return { passed: failDetails.length === 0, failDetails, cleanHtml };
}

// ─────────────────────────────────────────────────────────────────────────────
// Render the test table (initial state — all pending)
// ─────────────────────────────────────────────────────────────────────────────

function renderTestTable(results) {
  const tbody = document.getElementById("testResultsBody");
  tbody.innerHTML = "";

  PLAYGROUND_TEST_CASES.forEach((tc, idx) => {
    const result = results ? results[idx] : null;
    const tr = document.createElement("tr");

    // Label
    const tdLabel = document.createElement("td");
    tdLabel.style.fontWeight = "500";
    tdLabel.textContent = tc.label;
    tr.appendChild(tdLabel);

    // Sender
    const tdSender = document.createElement("td");
    const senderStr = tc.sender === null
      ? "(none)"
      : Array.isArray(tc.sender)
        ? tc.sender.join(", ")
        : tc.sender;
    const senderSpan = document.createElement("span");
    senderSpan.className = "sender-token";
    senderSpan.textContent = senderStr;
    tdSender.appendChild(senderSpan);
    tr.appendChild(tdSender);

    // Result badge
    const tdResult = document.createElement("td");
    if (result === null) {
      const badge = document.createElement("span");
      badge.className = "badge pending";
      badge.textContent = "—";
      tdResult.appendChild(badge);
    } else {
      const badge = document.createElement("span");
      badge.className = `badge ${result.passed ? "pass" : "fail"}`;
      badge.textContent = result.passed ? "PASS" : "FAIL";
      tdResult.appendChild(badge);
    }
    tr.appendChild(tdResult);

    // Details
    const tdDetails = document.createElement("td");
    if (result && !result.passed) {
      const div = document.createElement("div");
      div.className = "fail-details";
      div.textContent = result.failDetails.join(" | ");
      tdDetails.appendChild(div);
    } else if (result && result.passed) {
      tdDetails.style.color = "#6b7280";
      tdDetails.style.fontSize = "12px";
      const keeps = (tc.mustKeep || []).length;
      const removes = (tc.mustRemove || []).length;
      tdDetails.textContent = `${keeps} keep checks, ${removes} remove checks — all passed`;
    } else {
      tdDetails.style.color = "#9ca3af";
      tdDetails.style.fontSize = "12px";
      tdDetails.textContent = "Click \"Run All Tests\" to execute";
    }
    tr.appendChild(tdDetails);

    // Inspect button
    const tdInspect = document.createElement("td");
    const btn = document.createElement("button");
    btn.className = "btn-small";
    btn.textContent = "Load";
    btn.onclick = () => loadTestIntoEditor(idx, result);
    tdInspect.appendChild(btn);
    tr.appendChild(tdInspect);

    tbody.appendChild(tr);
  });
}

function loadTestIntoEditor(idx, result) {
  const tc = PLAYGROUND_TEST_CASES[idx];
  document.getElementById("htmlInput").value = tc.html;

  const senderStr = tc.sender === null
    ? ""
    : Array.isArray(tc.sender)
      ? tc.sender.join(", ")
      : tc.sender;
  document.getElementById("senderInput").value = senderStr;

  // If we already have a result, use it; otherwise run detection now
  if (result) {
    renderPanes(tc.html, result.cleanHtml);
    const statusBar = document.getElementById("statusBar");
    statusBar.textContent = `Loaded: "${tc.label}" — ${result.passed ? "PASS" : "FAIL"}`;
    statusBar.className = result.passed ? "status-bar success" : "status-bar error";
  } else {
    runDetection();
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─────────────────────────────────────────────────────────────────────────────
// Run all tests
// ─────────────────────────────────────────────────────────────────────────────

function runAllTests() {
  const results = PLAYGROUND_TEST_CASES.map(tc => runTestCase(tc));
  renderTestTable(results);

  const passed = results.filter(r => r.passed).length;
  const total = results.length;
  const badge = document.getElementById("summaryBadge");
  badge.textContent = `${passed} / ${total} passed`;
  badge.className = `summary-badge ${passed === total ? "all-pass" : "some-fail"}`;

  // Scroll to tests panel
  document.querySelector(".tests-panel").scrollIntoView({ behavior: "smooth", block: "start" });
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────

renderTestTable(null);
</script>
